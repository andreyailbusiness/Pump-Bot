<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Instarding Bot Dashboard</title>
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; background: #0b1220; color: #e6edf3; }
      header { padding: 16px 20px; background: #0f1a33; border-bottom: 1px solid #1f2a44; display: flex; gap: 16px; align-items: baseline; }
      header h1 { font-size: 16px; margin: 0; font-weight: 700; }
      header .meta { font-size: 12px; opacity: 0.8; }
      main { padding: 20px; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 16px; }
      .card { background: #0f1a33; border: 1px solid #1f2a44; border-radius: 12px; padding: 14px; }
      .card h2 { font-size: 13px; margin: 0 0 10px; opacity: 0.9; }
      table { width: 100%; border-collapse: collapse; font-size: 12px; }
      th, td { padding: 8px 6px; border-bottom: 1px solid #1f2a44; text-align: left; }
      th { opacity: 0.75; font-weight: 600; }
      .pill { padding: 2px 8px; border-radius: 999px; font-size: 11px; display: inline-block; }
      .long { background: rgba(34,197,94,0.15); color: #35d07f; border: 1px solid rgba(34,197,94,0.35); }
      .short { background: rgba(239,68,68,0.15); color: #ff6b6b; border: 1px solid rgba(239,68,68,0.35); }
      .upnl-pos { color: #35d07f; }
      .upnl-neg { color: #ff6b6b; }
      .warn { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.35); }
      .muted { opacity: 0.75; }
      .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .kpi { padding: 10px; border-radius: 10px; border: 1px solid #1f2a44; background: #0b1530; }
      .kpi .label { font-size: 11px; opacity: 0.7; }
      .kpi .value { font-size: 16px; font-weight: 700; margin-top: 4px; }
      @media (max-width: 980px) { main { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <header>
      <h1>Instarding Bot</h1>
      <div class="meta" id="meta">loading…</div>
      <div class="meta" id="conn" style="margin-left:8px;">connecting…</div>
      <div style="margin-left:auto" class="meta" id="dd"></div>
    </header>
    <main>
      <section class="card">
        <h2>Открытые позиции</h2>
        <div class="grid" style="margin-bottom: 10px;">
          <div class="kpi">
            <div class="label">Equity</div>
            <div class="value" id="equity">—</div>
          </div>
          <div class="kpi">
            <div class="label">Start equity</div>
            <div class="value" id="startEquity">—</div>
          </div>
          <div class="kpi">
            <div class="label">Max drawdown status</div>
            <div class="value" id="mdd">—</div>
          </div>
        </div>

        <table>
          <thead>
            <tr>
              <th>Symbol</th>
              <th>Side</th>
              <th>Qty</th>
              <th>Entry</th>
              <th>SL</th>
              <th>TP</th>
              <th>Last</th>
              <th>uPNL</th>
            </tr>
          </thead>
          <tbody id="positions"></tbody>
        </table>
        <div class="muted" style="margin-top: 10px;">Авто‑обновление каждые 15 секунд.</div>
      </section>

      <section class="card">
        <h2>Последние сделки</h2>
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Type</th>
              <th>Symbol</th>
              <th>Info</th>
            </tr>
          </thead>
          <tbody id="trades"></tbody>
        </table>
      </section>
    </main>

    <script>
      const STATE_CACHE_KEY = "instarding:last_state:v1";
      const fmt = (x) => (x === null || x === undefined) ? "—" : (typeof x === "number" ? x.toFixed(6).replace(/\.?0+$/,"") : String(x));
      const fmtPnl = (x) => (x === null || x === undefined) ? "—" : `${x >= 0 ? "+" : ""}${Number(x).toFixed(4).replace(/\.?0+$/,"")}`;
      const el = (id) => document.getElementById(id);

      function renderState(st, source = "live") {
        const sourceTag = source === "cache" ? " | cached" : "";
        el("meta").textContent = `updated: ${st.updated_at || "—"} | positions: ${Object.keys(st.positions||{}).length}${sourceTag}`;
        el("equity").textContent = fmt(st.equity);
        el("startEquity").textContent = fmt(st.start_equity);
        const dd = (st.start_equity > 0) ? ((st.start_equity - st.equity) / st.start_equity) : 0;
        const ddPct = (dd * 100).toFixed(2) + "%";
        el("dd").textContent = `drawdown: ${ddPct}`;
        el("mdd").innerHTML = dd >= 0.08 ? `<span class="pill warn">halted (>= 8%)</span>` : `<span class="pill long">ok</span>`;

        const posBody = el("positions");
        posBody.innerHTML = "";
        const positions = st.positions || {};
        for (const [sym, p] of Object.entries(positions)) {
          const sideClass = p.side === "short" ? "short" : "long";
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${sym}</td>
            <td><span class="pill ${sideClass}">${p.side}</span></td>
            <td>${fmt(p.qty)}</td>
            <td>${fmt(p.entry_price)}</td>
            <td>${fmt(p.trailing_active && p.trailing_sl ? p.trailing_sl : p.sl)}</td>
            <td>${fmt(p.tp)}</td>
            <td>${fmt(p.last_price)}</td>
            <td class="${(p.upnl ?? 0) >= 0 ? "upnl-pos" : "upnl-neg"}">${fmtPnl(p.upnl)}</td>
          `;
          posBody.appendChild(tr);
        }
        if (Object.keys(positions).length === 0) {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td colspan="8" class="muted">Пока нет открытых позиций.</td>`;
          posBody.appendChild(tr);
        }

        const tradesBody = el("trades");
        tradesBody.innerHTML = "";
        const trades = (st.trades || []).slice(-25).reverse();
        for (const t of trades) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td class="muted">${t.time || "—"}</td>
            <td>${t.type || "—"}</td>
            <td>${t.symbol || "—"}</td>
            <td class="muted">${t.reason || ""} ${t.pnl !== undefined ? (" pnl=" + fmt(t.pnl)) : ""}</td>
          `;
          tradesBody.appendChild(tr);
        }
        if (trades.length === 0) {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td colspan="4" class="muted">История пустая.</td>`;
          tradesBody.appendChild(tr);
        }
      }

      function loadCachedState() {
        try {
          const raw = localStorage.getItem(STATE_CACHE_KEY);
          if (!raw) return false;
          const parsed = JSON.parse(raw);
          renderState(parsed, "cache");
          return true;
        } catch {
          return false;
        }
      }

      async function load() {
        try {
          const res = await fetch("/api/state", { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const st = await res.json();
          renderState(st, "live");
          el("conn").innerHTML = `<span class="pill long">online</span>`;
          localStorage.setItem(STATE_CACHE_KEY, JSON.stringify(st));
        } catch {
          const hasCache = loadCachedState();
          el("conn").innerHTML = hasCache
            ? `<span class="pill warn">server waking up (showing cache)</span>`
            : `<span class="pill warn">server unavailable</span>`;
        }
      }

      load();
      setInterval(load, 15000);
    </script>
  </body>
</html>
