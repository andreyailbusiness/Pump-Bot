services:
  - type: web
    name: instarding-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m bot.main
    autoDeploy: true
    envVars:
      - key: TRADING_MODE
        value: paper
      - key: QUOTE_ASSET
        value: USDT
      - key: MARKET_TYPE
        value: futures
      - key: TOP_SYMBOLS_LIMIT
        value: "120"
      - key: STATE_PATH
        value: /var/data/state.json
      - key: TOP_SYMBOLS_CACHE_PATH
        value: /var/data/top_symbols.json
      - key: STATE_BACKUP_ENABLED
        value: "true"
      - key: STATE_BACKUP_INTERVAL_SEC
        value: "900"
      - key: STATE_BACKUP_DIR
        value: /var/data/backups
      - key: STATE_BACKUP_KEEP
        value: "96"
      - key: GITHUB_STATE_SYNC_ENABLED
        value: "true"
      - key: GITHUB_STATE_REPO
        value: andreyailbusiness/Pump-Bot
      - key: GITHUB_STATE_FILE_PATH
        value: data/render_state.json
      - key: GITHUB_STATE_BRANCH
        value: main
      - key: GITHUB_STATE_SYNC_INTERVAL_SEC
        value: "300"
      - key: GITHUB_STATE_TIMEOUT_SEC
        value: "15"
      - key: GITHUB_STATE_COMMIT_MESSAGE
        value: "chore(state): sync bot runtime state"
      - key: TIMEFRAME
        value: 15m
      - key: CANDLES_LIMIT
        value: "300"
      - key: RISK_PERCENT
        value: "0.01"
      - key: RISK_PERCENT_STRONG
        value: "0.015"
      - key: RISK_PERCENT_NEUTRAL
        value: "0.015"
      - key: RISK_PERCENT_WEAK
        value: "0.015"
      - key: MAX_DRAWDOWN
        value: "1"
      - key: LEVERAGE
        value: "10"
      - key: ADX_THRESHOLD
        value: "25"
      - key: STRATEGY_ENTRY_MODE
        value: pump
      - key: STRATEGY_ENTRY_MODE_STRONG
        value: pump
      - key: STRATEGY_ENTRY_MODE_NEUTRAL
        value: hybrid
      - key: STRATEGY_ENTRY_MODE_WEAK
        value: hybrid
      - key: WEAK_DISABLE_IMPULSE_ENTRIES
        value: "true"
      - key: PUMP_LOOKBACK
        value: "6"
      - key: PUMP_MIN_RET_1H
        value: "0.02"
      - key: PUMP_VOLUME_MULT
        value: "1.8"
      - key: PUMP_CLOSE_POS_MIN
        value: "0.65"
      - key: PUMP_MAX_OVEREXT_ATR
        value: "1.0"
      - key: PUMP_MAX_OPP_WICK_RATIO
        value: "1.2"
      - key: PUMP_SHORT_MIN_RET_1H
        value: "0.018"
      - key: PUMP_SHORT_VOLUME_MULT
        value: "1.8"
      - key: PUMP_SHORT_CLOSE_POS_MIN
        value: "0.65"
      - key: PUMP_SHORT_MAX_OVEREXT_ATR
        value: "1.4"
      - key: PUMP_SHORT_MAX_OPP_WICK_RATIO
        value: "1.0"
      - key: PUMP_MIN_BODY_ATR_LONG
        value: "0.35"
      - key: PUMP_MIN_BODY_ATR_SHORT
        value: "0.40"
      - key: PUMP_MAX_RANGE_ATR
        value: "3.5"
      - key: PUMP_BREAKOUT_BUFFER_ATR
        value: "0.10"
      - key: PUMP_CONTINUATION_MIN_RATIO_LONG
        value: "0.985"
      - key: PUMP_CONTINUATION_MAX_RATIO_SHORT
        value: "1.015"
      - key: ATR_MIN_PCT
        value: "0.005"
      - key: NEUTRAL_MIN_BREADTH_COUNT
        value: "3"
      - key: COOLDOWN_HOURS
        value: "48"
      - key: LOSS_STREAK_BLOCK_THRESHOLD
        value: "2"
      - key: LOSS_STREAK_BLOCK_HOURS
        value: "72"
      - key: PAPER_STAGED_EXITS
        value: "true"
      - key: PAPER_STAGE2_R
        value: "3.0"
      - key: PAPER_STAGE2_CLOSE_RATIO
        value: "0.50"
      - key: PAPER_STAGED_FINAL_R
        value: "false"
      - key: PAPER_STAGE3_R
        value: "5.0"
      - key: FUTURES_TAKER_FEE_RATE
        value: "0.0004"
      - key: SLIPPAGE_BPS
        value: "2.0"
