services:
  - type: web
    name: instarding-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m bot.main
    autoDeploy: true
    envVars:
      - key: TRADING_MODE
        value: paper
      - key: QUOTE_ASSET
        value: USDT
      - key: MARKET_TYPE
        value: futures
      - key: TOP_SYMBOLS_LIMIT
        value: "150"
      - key: STATE_PATH
        value: /var/data/state.json
      - key: TOP_SYMBOLS_CACHE_PATH
        value: /var/data/top_symbols.json
      - key: STATE_BACKUP_ENABLED
        value: "true"
      - key: STATE_BACKUP_INTERVAL_SEC
        value: "900"
      - key: STATE_BACKUP_DIR
        value: /var/data/backups
      - key: STATE_BACKUP_KEEP
        value: "96"
      - key: TIMEFRAME
        value: 1h
      - key: CANDLES_LIMIT
        value: "300"
      - key: RISK_PERCENT
        value: "0.01"
      - key: MAX_DRAWDOWN
        value: "0.08"
      - key: LEVERAGE
        value: "1"
      - key: ADX_THRESHOLD
        value: "25"
      - key: ATR_MIN_PCT
        value: "0.005"
      - key: COOLDOWN_HOURS
        value: "48"
      - key: FUTURES_TAKER_FEE_RATE
        value: "0.0004"
      - key: SLIPPAGE_BPS
        value: "2.0"
